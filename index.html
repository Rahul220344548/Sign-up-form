<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up form</title>
    <link rel="Stylesheet" href="css/styles.css">
</head>

<body>

    <div class="container">
        <div class="hero-panel">
            <div class="background-img">
                <div class="hero-overlay">
                    <div class="logo-block">
                        <img src="logo /odin-lined.png" class="odin-logo" alt="Logo">
                    </div>
                    <div class="branding-overlay">
                        ODIN
                    </div>
                </div>
                <div class="bgd-credits">
                    <p>
                    Photo by 
                    <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA"
                    target="_blank"
                    style="color: beige;">Halie West </a>
                    On
                    <a href="https://unsplash.com/"
                    target="_blank"
                    style="color: beige;">Unsplash</a>
                    </p>
                </div>
            </div>   
        </div>

        <div class="main-content-area">

            <div class="paragraph-section">
                <p class="paragraph-1">
                    This is not a real online service! You know you need something
                    like this is your life to help you realize your deepest dreams.
                    <br>Sign up now to get started!
                </p><br>
                <p class="paragraph-2">You know you want to.</p>
            </div>

            <div class="form-section">

                <form action="" method="get">
                    <fieldset>
                        <div class="form-title">
                           <h3>Lets do this!</h3>
                        </div>

                        <div class="form-row field-row1">
                            <div class="name-field">
                                <label for="full-name">NAME</label><br>
                                <input id="full-name" name="full-name" type="text"/>
                            </div>
                            <div class="lastname-field">
                                <label for="last-name">LAST NAME</label><br>
                                <input id="last-name" name="last-name" type="text"/>
                            </div>
                        </div>
                    
                        <div class="form-row field-row2">
                            <div class="email-field">
                                <label for="email">Email</label><br>
                            <input id="email" name="email" type="email" placeholder="rahul@gmail.com"/>
                            </div>
            
                            <div class="phonenumber-field">
                                <label for="phonenumber">Phone Number</label><br>
                                <input id="phonenumber" name="phonenumber" type="tel"/>
                            </div>
                        </div>

                        <div class="form-row field-row3">
                            
                            <div class="password-field">
                                <label for="password">Password</label><br>
                                <input id="password" name="password" type="password"/>
                            </div>

                            <div class="confirmpassword-field">
                                <label for="confirm_password"> Confirm Password</label><br>
                                <input id="confirm_password" name="confirm_password" type="password"/>
                            </div>
                        </div>

                    </fieldset>
                </form>
            </div>

            <div class="registration-section">
                        <div class="form-row">
                            <button>Create Account</button>
                        </div>

                        <div class="already-logged-in-message">
                            <p>Already have an account? Log in</p>
                        </div>
            </div>

        </div>
    </div>

    
</body>

</html>
